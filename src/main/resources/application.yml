spring:
  application:
    name: ecogad
  datasource:
    url: "${DB_URL:jdbc:h2:mem:ecogad;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}"
    username: "${DB_USERNAME:sa}"
    password: "${DB_PASSWORD:}"
  jpa:
    hibernate:
      ddl-auto: "${JPA_DDL_AUTO:update}"
    open-in-view: false
  mail:
    host: "${MAIL_HOST:localhost}"
    port: "${MAIL_PORT:1025}"
    username: "${MAIL_USERNAME:}"
    password: "${MAIL_PASSWORD:}"
    properties:
      mail:
        smtp:
          auth: "${MAIL_SMTP_AUTH:false}"
          starttls:
            enable: "${MAIL_SMTP_STARTTLS:false}"

app:
  mail:
    from: "${MAIL_FROM:no-reply@ecogad.com}"
    inquiry-to: "${INQUIRY_ALERT_TO:admin@ecogad.com}"

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
